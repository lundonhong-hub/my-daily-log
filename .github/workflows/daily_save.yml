name: 6시간마다 파일 저장하기 (시간 표시)

on:
  schedule:
    # 한국 시간 기준: 06:00, 12:00, 18:00, 00:00 실행
    # (UTC 기준: 21:00, 03:00, 09:00, 15:00)
    - cron: '0 21,3,9,15 * * *'
  workflow_dispatch: # 테스트를 위해 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: 날짜 및 실행 시간 결정
        run: |
          # 한국 시간(KST) 설정
          export TZ='Asia/Seoul'
          TODAY=$(date +'%Y%m%d')
          H=$(date +'%H')
          
          # 현재 시간에 맞춰 파일명용 시간(HH) 확정
          if [ "$H" -ge "03" ] && [ "$H" -lt "09" ]; then HH="06";
          elif [ "$H" -ge "09" ] && [ "$H" -lt "15" ]; then HH="12";
          elif [ "$H" -ge "15" ] && [ "$H" -lt "21" ]; then HH="18";
          else HH="00";
          fi
          
          echo "FILENAME=dashboard_${TODAY}_${HH}.html" >> $GITHUB_ENV

      - name: HTML 파일 생성
        run: |
          # 1. 여기에 클로드가 만든 HTML 코드가 들어갑니다.
          # 2. 지금은 예시로 파일명만 적힌 파일을 만듭니다.
          echo "<html><body><h1>${{ env.FILENAME }} 데이터 리포트</h1></body></html>" > ${{ env.FILENAME }}

      - name: 깃허브 저장소에 푸시
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add .
          # 변경사항이 있을 때만 커밋
          if ! git diff --cached --quiet; then
            git commit -m "자동 업데이트: ${{ env.FILENAME }}"
            git push
          fi
