name: 6시간마다 대시보드 생성 (Claude API)
on:
  schedule:
    - cron: '0 21,3,9,15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic requests

      - name: 날짜 및 번호 계산
        run: |
          export TZ='Asia/Seoul'
          TODAY=$(date +'%Y%m%d')
          HOUR=$(date +'%H')
          if [ "$HOUR" -lt "09" ]; then NUM="1";
          elif [ "$HOUR" -lt "15" ]; then NUM="2";
          elif [ "$HOUR" -lt "21" ]; then NUM="3";
          else NUM="4";
          fi
          echo "FILENAME=dashboard_${TODAY}_${NUM}.html" >> $GITHUB_ENV
          echo "TODAY=${TODAY}" >> $GITHUB_ENV

      - name: Claude API로 대시보드 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILENAME: ${{ env.FILENAME }}
          TODAY: ${{ env.TODAY }}
        run: python generate_dashboard.py

      - name: GitHub에 저장
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Add ${{ env.FILENAME }}" && git push)

      - name: 이메일 발송
        env:
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          NAVER_PASSWORD: ${{ secrets.NAVER_PASSWORD }}
          FILENAME: ${{ env.FILENAME }}
        run: |
          python - <<EOF
          import smtplib
          import os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication

          sender = os.environ["NAVER_EMAIL"]
          password = os.environ["NAVER_PASSWORD"]
          filename = os.environ["FILENAME"]

          # 1. 메일 객체 생성 (혼합형 구성)
          msg = MIMEMultipart("mixed")
          msg["Subject"] = f"📊 시장 대시보드 - {filename}"
          msg["From"] = sender
          msg["To"] = sender

          # 2. 간단한 본문 추가 (본문이 비어있으면 스팸 처리될 수 있음)
          body = f"생성된 대시보드 파일({filename})을 첨부합니다. 다운로드하여 확인하세요."
          msg.attach(MIMEText(body, "plain", "utf-8"))

          # 3. HTML 파일 첨부 로직
          try:
              with open(filename, "rb") as f:
                  attachment = MIMEApplication(f.read())
                  attachment.add_header('Content-Disposition', 'attachment', filename=filename)
                  msg.attach(attachment)
              
              # 4. SMTP 서버 접속 및 발송
              with smtplib.SMTP_SSL("smtp.naver.com", 465) as smtp:
                  smtp.login(sender, password)
                  smtp.sendmail(sender, sender, msg.as_string())
              print(f"[{filename}] 첨부파일 이메일 발송 완료!")
              
          except Exception as e:
              print(f"발송 실패: {e}")
              exit(1)
          EOF
