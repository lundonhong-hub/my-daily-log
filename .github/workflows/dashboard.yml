name: 6시간마다 대시보드 생성 (Claude API)
on:
  schedule:
    - cron: '0 21,3,9,15 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic requests

      - name: 날짜 및 번호 계산
        run: |
          export TZ='Asia/Seoul'
          TODAY=$(date +'%Y%m%d')
          HOUR=$(date +'%H')
          if [ "$HOUR" -lt "09" ]; then NUM="1";
          elif [ "$HOUR" -lt "15" ]; then NUM="2";
          elif [ "$HOUR" -lt "21" ]; then NUM="3";
          else NUM="4";
          fi
          echo "FILENAME=dashboard_${TODAY}_${NUM}.html" >> $GITHUB_ENV
          echo "TODAY=${TODAY}" >> $GITHUB_ENV

      - name: Claude API로 대시보드 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILENAME: ${{ env.FILENAME }}
          TODAY: ${{ env.TODAY }}
        run: python generate_dashboard.py

      - name: GitHub에 저장
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "Add ${{ env.FILENAME }}" && git push)
