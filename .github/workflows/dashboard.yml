name: 6시간마다 대시보드 생성 (Claude API)
on:
  schedule:
    - cron: '50 20,2,8,14 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install anthropic requests

      - name: 날짜 및 번호 계산
        run: |
          export TZ='Asia/Seoul'
          TODAY=$(date +'%Y%m%d')
          # 1. 실제 파일은 index.html로 고정
          echo "FILENAME=index.html" >> $GITHUB_ENV
          echo "TODAY=${TODAY}" >> $GITHUB_ENV
          # 2. 메일 제목용 식별자 (예: dashboard_20260307_1.html)
          HOUR=$(date +'%H')
          if [ "$HOUR" -lt "09" ]; then NUM="1";
          elif [ "$HOUR" -lt "15" ]; then NUM="2";
          elif [ "$HOUR" -lt "21" ]; then NUM="3";
          else NUM="4";
          fi
          echo "MAIL_TITLE=dashboard_${TODAY}_${NUM}.html" >> $GITHUB_ENV
          # 3. 대시보드 상단 기입용 시간
          echo "UPDATE_TIME=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Claude API로 대시보드 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FILENAME: ${{ env.FILENAME }}
          TODAY: ${{ env.TODAY }}
          UPDATE_TIME: ${{ env.UPDATE_TIME }}
        run: python generate_dashboard.py

      - name: GitHub에 저장
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "Update dashboard: ${{ env.MAIL_TITLE }}" || echo "No changes to commit"
          git pull --rebase origin main || true
          git push

      - name: 이메일 발송
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NAVER_EMAIL: ${{ secrets.NAVER_EMAIL }}
          FILENAME: ${{ env.FILENAME }}
          MAIL_TITLE: ${{ env.MAIL_TITLE }}
        run: |
          python - <<EOF
          import smtplib
          import os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from email.mime.application import MIMEApplication

          sender = os.environ["GMAIL_EMAIL"]        # 보내는 사람: Gmail
          password = os.environ["GMAIL_APP_PASSWORD"]  # Gmail 앱 비밀번호
          receiver = os.environ["NAVER_EMAIL"]      # 받는 사람: 네이버
          filename = os.environ["FILENAME"]
          mail_title = os.environ["MAIL_TITLE"]

          msg = MIMEMultipart("mixed")
          msg["Subject"] = f"📊 시장 대시보드 - {mail_title}"
          msg["From"] = sender
          msg["To"] = receiver

          body = f"생성된 대시보드 파일({mail_title})을 index.html 형태로 첨부합니다."
          msg.attach(MIMEText(body, "plain", "utf-8"))

          try:
              with open(filename, "rb") as f:
                  attachment = MIMEApplication(f.read())
                  attachment.add_header('Content-Disposition', 'attachment', filename=filename)
                  msg.attach(attachment)

              # Gmail SMTP (포트 587, TLS)
              with smtplib.SMTP("smtp.gmail.com", 587) as smtp:
                  smtp.ehlo()
                  smtp.starttls()
                  smtp.login(sender, password)
                  smtp.sendmail(sender, receiver, msg.as_string())
              print(f"[{mail_title}] 이메일 발송 완료! {sender} → {receiver}")
          except Exception as e:
              print(f"발송 실패: {e}")
              exit(1)
          EOF
